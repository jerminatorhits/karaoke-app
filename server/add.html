<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add to Karaoke Queue</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      min-height: 100vh;
      background: #0f0e14;
      color: #e8e4f0;
      padding: 1.5rem;
    }
    .container { max-width: 420px; margin: 0 auto; }
    h1 { font-size: 1.25rem; margin: 0 0 1rem; }
    label { display: block; font-size: 0.85rem; margin-bottom: 0.25rem; color: #8b8698; }
    input[type="text"],
    input[type="search"] {
      width: 100%;
      padding: 0.75rem;
      margin-bottom: 0.5rem;
      border: 1px solid #2d2a3a;
      border-radius: 8px;
      background: #1a1922;
      color: #e8e4f0;
      font-size: 1rem;
    }
    .row { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .row input { margin-bottom: 0; flex: 1; }
    button {
      padding: 0.75rem 1rem;
      background: #ff6b9d;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .message { margin-top: 0.5rem; font-size: 0.9rem; min-height: 1.5em; }
    .message.success { color: #7bed9f; }
    .message.error { color: #ff6b6b; }
    .section { margin-bottom: 1.5rem; }
    .section-title { font-size: 0.85rem; color: #8b8698; margin-bottom: 0.5rem; }
    .search-results {
      list-style: none;
      margin: 0;
      padding: 0;
      max-height: 280px;
      overflow-y: auto;
      border: 1px solid #2d2a3a;
      border-radius: 8px;
      background: #1a1922;
    }
    .search-results li { border-bottom: 1px solid #2d2a3a; }
    .search-results li:last-child { border-bottom: none; }
    .result-btn {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      width: 100%;
      padding: 0.5rem 0.6rem;
      background: none;
      border: none;
      color: #e8e4f0;
      font-size: 0.85rem;
      text-align: left;
      cursor: pointer;
    }
    .result-btn:hover { background: rgba(255,255,255,0.06); }
    .result-thumb {
      width: 100px;
      height: 56px;
      object-fit: cover;
      border-radius: 4px;
      background: #2d2a3a;
      flex-shrink: 0;
    }
    .result-info { flex: 1; min-width: 0; }
    .result-title { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.3; }
    .result-channel { font-size: 0.75rem; color: #8b8698; margin-top: 0.15rem; }
    .result-add {
      flex-shrink: 0;
      padding: 0.25rem 0.5rem;
      background: #ff6b9d;
      color: #fff;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .result-btn:hover .result-add { background: #c94d7a; }
    .queue-preview {
      margin-bottom: 1.5rem;
      padding: 0.75rem;
      border: 1px solid #2d2a3a;
      border-radius: 8px;
      background: #1a1922;
    }
    .queue-preview.empty { color: #8b8698; font-size: 0.9rem; }
    .queue-preview-list {
      list-style: none;
      margin: 0;
      padding: 0;
      max-height: 160px;
      overflow-y: auto;
    }
    .queue-preview-list li {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.35rem 0;
      font-size: 0.85rem;
      border-bottom: 1px solid #2d2a3a;
    }
    .queue-preview-list li:last-child { border-bottom: none; }
    .queue-preview-num { color: #8b8698; min-width: 1.5em; flex-shrink: 0; }
    .queue-preview-title { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Add to Karaoke Queue</h1>

    <div class="section">
      <label for="room">Room code</label>
      <input type="text" id="room" placeholder="e.g. ABC123" required maxlength="10" />
    </div>

    <div class="section queue-preview-section" id="queuePreviewSection" aria-label="Current queue">
      <div class="section-title">Current queue</div>
      <div class="queue-preview" id="queuePreview">
        <span class="empty">Enter room code to see queue.</span>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Search YouTube</div>
      <div class="row">
        <input type="search" id="search" placeholder="Search for a song..." />
        <button type="button" id="searchBtn">Search</button>
      </div>
      <ul class="search-results" id="searchResults" aria-label="Search results"></ul>
      <p class="message" id="searchMessage" aria-live="polite"></p>
    </div>
  </div>
  <script>
    const roomInput = document.getElementById('room')
    const searchInput = document.getElementById('search')
    const searchBtn = document.getElementById('searchBtn')
    const searchResults = document.getElementById('searchResults')
    const searchMessage = document.getElementById('searchMessage')
    const queuePreview = document.getElementById('queuePreview')

    const params = new URLSearchParams(window.location.search)
    if (params.get('room')) roomInput.value = params.get('room')

    const MAX_QUEUE_PREVIEW = 15
    let queuePollTimer = null

    function getRoomId() {
      return roomInput.value.trim().toUpperCase()
    }

    async function fetchQueue() {
      const roomId = getRoomId()
      if (!roomId) {
        queuePreview.innerHTML = '<span class="empty">Enter room code to see queue.</span>'
        queuePreview.className = 'queue-preview empty'
        return
      }
      try {
        const res = await fetch(window.location.origin + '/api/room/' + encodeURIComponent(roomId) + '/queue')
        if (res.status === 404) {
          queuePreview.innerHTML = '<span class="empty">Room not found.</span>'
          queuePreview.className = 'queue-preview empty'
          return
        }
        if (!res.ok) throw new Error('Failed to load queue')
        const queue = await res.json()
        if (!Array.isArray(queue) || queue.length === 0) {
          queuePreview.innerHTML = '<span class="empty">Queue is empty. Your song will be first!</span>'
          queuePreview.className = 'queue-preview empty'
          return
        }
        const show = queue.slice(0, MAX_QUEUE_PREVIEW)
        queuePreview.className = 'queue-preview'
        queuePreview.innerHTML = ''
        const ul = document.createElement('ul')
        ul.className = 'queue-preview-list'
        show.forEach((item, i) => {
          const li = document.createElement('li')
          li.innerHTML = '<span class="queue-preview-num">' + (i + 1) + '.</span><span class="queue-preview-title" title="' + escapeHtml(item.title) + '">' + escapeHtml(item.title) + '</span>'
          ul.appendChild(li)
        })
        queuePreview.appendChild(ul)
        if (queue.length > MAX_QUEUE_PREVIEW) {
          const more = document.createElement('p')
          more.className = 'empty'
          more.style.marginTop = '0.5rem'
          more.style.marginBottom = '0'
          more.textContent = '+ ' + (queue.length - MAX_QUEUE_PREVIEW) + ' more'
          queuePreview.appendChild(more)
        }
      } catch {
        queuePreview.innerHTML = '<span class="empty">Could not load queue.</span>'
        queuePreview.className = 'queue-preview empty'
      }
    }

    function startQueuePoll() {
      if (queuePollTimer) clearInterval(queuePollTimer)
      const roomId = getRoomId()
      if (!roomId) return
      fetchQueue()
      queuePollTimer = setInterval(fetchQueue, 5000)
    }

    function stopQueuePoll() {
      if (queuePollTimer) {
        clearInterval(queuePollTimer)
        queuePollTimer = null
      }
    }

    roomInput.addEventListener('input', () => {
      stopQueuePoll()
      const roomId = getRoomId()
      if (roomId) startQueuePoll()
      else fetchQueue()
    })
    roomInput.addEventListener('blur', () => {
      if (getRoomId()) fetchQueue()
    })

    if (getRoomId()) startQueuePoll()
    else fetchQueue()

    function setSearchMsg(text, type) {
      searchMessage.textContent = text || ''
      searchMessage.className = 'message ' + (type || '')
    }

    async function addToQueue(videoId) {
      const roomId = getRoomId()
      if (!roomId) {
        setSearchMsg('Enter room code first.', 'error')
        return
      }
      try {
        const res = await fetch(window.location.origin + '/api/room/' + encodeURIComponent(roomId) + '/queue', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ videoId }),
        })
        if (!res.ok) {
          const err = await res.json().catch(() => ({}))
          throw new Error(err.error || res.statusText)
        }
        setSearchMsg('Added to queue!', 'success')
        fetchQueue()
        setTimeout(() => setSearchMsg(''), 2000)
      } catch (err) {
        setSearchMsg(err.message || 'Failed to add.', 'error')
      }
    }

    searchBtn.addEventListener('click', async () => {
      const q = searchInput.value.trim()
      if (!q) return
      searchResults.innerHTML = ''
      setSearchMsg('Searching…')
      searchBtn.disabled = true
      try {
        const res = await fetch(window.location.origin + '/api/search?q=' + encodeURIComponent(q))
        const data = await res.json()
        if (!res.ok) {
          throw new Error(data.error || res.statusText)
        }
        setSearchMsg('')
        if (!data.length) {
          setSearchMsg('No results found.', 'error')
          return
        }
        data.forEach((item) => {
          const li = document.createElement('li')
          li.innerHTML = `
            <button type="button" class="result-btn" data-video-id="${item.videoId}">
              ${item.thumbnailUrl ? `<img class="result-thumb" src="${item.thumbnailUrl}" alt="" width="100" height="56" />` : ''}
              <span class="result-info">
                <span class="result-title">${escapeHtml(item.title)}</span>
                ${item.channelTitle ? `<span class="result-channel">${escapeHtml(item.channelTitle)}</span>` : ''}
              </span>
              <span class="result-add">+ Add</span>
            </button>
          `
          li.querySelector('button').addEventListener('click', () => addToQueue(item.videoId))
          searchResults.appendChild(li)
        })
      } catch (err) {
        setSearchMsg(err.message || 'Search failed', 'error')
      } finally {
        searchBtn.disabled = false
      }
    })

    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault()
        searchBtn.click()
      }
    })

    function escapeHtml(s) {
      const div = document.createElement('div')
      div.textContent = s
      return div.innerHTML
    }
  </script>
</body>
</html>
