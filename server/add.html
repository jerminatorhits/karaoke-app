<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add to Karaoke Queue</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      min-height: 100vh;
      background: #0f0e14;
      color: #e8e4f0;
      padding: 1.5rem;
    }
    .container { max-width: 420px; margin: 0 auto; }
    h1 { font-size: 1.25rem; margin: 0 0 1rem; }
    label { display: block; font-size: 0.85rem; margin-bottom: 0.25rem; color: #8b8698; }
    input[type="text"],
    input[type="url"],
    input[type="search"] {
      width: 100%;
      padding: 0.75rem;
      margin-bottom: 0.5rem;
      border: 1px solid #2d2a3a;
      border-radius: 8px;
      background: #1a1922;
      color: #e8e4f0;
      font-size: 1rem;
    }
    .row { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .row input { margin-bottom: 0; flex: 1; }
    button {
      padding: 0.75rem 1rem;
      background: #ff6b9d;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .message { margin-top: 0.5rem; font-size: 0.9rem; min-height: 1.5em; }
    .message.success { color: #7bed9f; }
    .message.error { color: #ff6b6b; }
    .section { margin-bottom: 1.5rem; }
    .section-title { font-size: 0.85rem; color: #8b8698; margin-bottom: 0.5rem; }
    .search-results {
      list-style: none;
      margin: 0;
      padding: 0;
      max-height: 280px;
      overflow-y: auto;
      border: 1px solid #2d2a3a;
      border-radius: 8px;
      background: #1a1922;
    }
    .search-results li { border-bottom: 1px solid #2d2a3a; }
    .search-results li:last-child { border-bottom: none; }
    .result-btn {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      width: 100%;
      padding: 0.5rem 0.6rem;
      background: none;
      border: none;
      color: #e8e4f0;
      font-size: 0.85rem;
      text-align: left;
      cursor: pointer;
    }
    .result-btn:hover { background: rgba(255,255,255,0.06); }
    .result-thumb {
      width: 100px;
      height: 56px;
      object-fit: cover;
      border-radius: 4px;
      background: #2d2a3a;
      flex-shrink: 0;
    }
    .result-info { flex: 1; min-width: 0; }
    .result-title { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.3; }
    .result-channel { font-size: 0.75rem; color: #8b8698; margin-top: 0.15rem; }
    .result-add {
      flex-shrink: 0;
      padding: 0.25rem 0.5rem;
      background: #ff6b9d;
      color: #fff;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .result-btn:hover .result-add { background: #c94d7a; }
    .paste-section { padding-top: 1rem; border-top: 1px solid #2d2a3a; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Add to Karaoke Queue</h1>

    <div class="section">
      <label for="room">Room code</label>
      <input type="text" id="room" placeholder="e.g. ABC123" required maxlength="10" />
    </div>

    <div class="section">
      <div class="section-title">Search YouTube</div>
      <div class="row">
        <input type="search" id="search" placeholder="Search for a song..." />
        <button type="button" id="searchBtn">Search</button>
      </div>
      <ul class="search-results" id="searchResults" aria-label="Search results"></ul>
      <p class="message" id="searchMessage" aria-live="polite"></p>
    </div>

    <div class="section paste-section">
      <div class="section-title">Or paste YouTube URL</div>
      <form id="form">
        <input type="url" id="url" placeholder="https://youtube.com/watch?v=..." />
        <button type="submit" id="btn">Add to queue</button>
      </form>
      <p class="message" id="message" aria-live="polite"></p>
    </div>
  </div>
  <script>
    const YT_REGEX = /(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/
    const roomInput = document.getElementById('room')
    const searchInput = document.getElementById('search')
    const searchBtn = document.getElementById('searchBtn')
    const searchResults = document.getElementById('searchResults')
    const searchMessage = document.getElementById('searchMessage')
    const form = document.getElementById('form')
    const urlInput = document.getElementById('url')
    const btn = document.getElementById('btn')
    const message = document.getElementById('message')

    const params = new URLSearchParams(window.location.search)
    if (params.get('room')) roomInput.value = params.get('room')

    function getRoomId() {
      return roomInput.value.trim().toUpperCase()
    }

    function setMsg(text, type) {
      message.textContent = text
      message.className = 'message ' + (type || '')
    }

    function setSearchMsg(text, type) {
      searchMessage.textContent = text || ''
      searchMessage.className = 'message ' + (type || '')
    }

    async function addToQueue(videoId, title) {
      const roomId = getRoomId()
      if (!roomId) {
        setMsg('Enter room code first.', 'error')
        return
      }
      try {
        const res = await fetch(window.location.origin + '/api/room/' + encodeURIComponent(roomId) + '/queue', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ videoId }),
        })
        if (!res.ok) {
          const err = await res.json().catch(() => ({}))
          throw new Error(err.error || res.statusText)
        }
        setMsg('Added to queue!', 'success')
        setSearchMsg('Added to queue!', 'success')
        setTimeout(() => { setMsg(''); setSearchMsg('') }, 2000)
      } catch (err) {
        setMsg(err.message || 'Failed to add.', 'error')
        setSearchMsg(err.message || 'Failed to add.', 'error')
      }
    }

    searchBtn.addEventListener('click', async () => {
      const q = searchInput.value.trim()
      if (!q) return
      searchResults.innerHTML = ''
      setSearchMsg('Searching…')
      searchBtn.disabled = true
      try {
        const res = await fetch(window.location.origin + '/api/search?q=' + encodeURIComponent(q))
        const data = await res.json()
        if (!res.ok) {
          throw new Error(data.error || res.statusText)
        }
        setSearchMsg('')
        if (!data.length) {
          setSearchMsg('No results found.', 'error')
          return
        }
        data.forEach((item) => {
          const li = document.createElement('li')
          li.innerHTML = `
            <button type="button" class="result-btn" data-video-id="${item.videoId}">
              ${item.thumbnailUrl ? `<img class="result-thumb" src="${item.thumbnailUrl}" alt="" width="100" height="56" />` : ''}
              <span class="result-info">
                <span class="result-title">${escapeHtml(item.title)}</span>
                ${item.channelTitle ? `<span class="result-channel">${escapeHtml(item.channelTitle)}</span>` : ''}
              </span>
              <span class="result-add">+ Add</span>
            </button>
          `
          li.querySelector('button').addEventListener('click', () => addToQueue(item.videoId, item.title))
          searchResults.appendChild(li)
        })
      } catch (err) {
        setSearchMsg(err.message || 'Search failed', 'error')
      } finally {
        searchBtn.disabled = false
      }
    })

    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault()
        searchBtn.click()
      }
    })

    function escapeHtml(s) {
      const div = document.createElement('div')
      div.textContent = s
      return div.innerHTML
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault()
      const roomId = getRoomId()
      const url = urlInput.value.trim()
      const match = url.match(YT_REGEX)
      if (!match) {
        setMsg('Enter a valid YouTube URL.', 'error')
        return
      }
      const videoId = match[1]
      btn.disabled = true
      setMsg('Adding…')
      try {
        await addToQueue(videoId)
        urlInput.value = ''
      } finally {
        btn.disabled = false
      }
    })
  </script>
</body>
</html>
